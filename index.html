<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swivl · Meeting Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ──────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#F5F5F7;color:#000;-webkit-font-smoothing:antialiased;min-height:100vh;padding-bottom:60px}
input,textarea,button,select{font-family:inherit}
button{cursor:pointer;transition:filter .12s,transform .1s}
button:hover:not(:disabled){filter:brightness(.93)}
button:active:not(:disabled){transform:scale(.98)}
button:disabled{cursor:not-allowed;opacity:.45}
input,textarea{display:block;width:100%;background:#fff;border:1.5px solid #E2E2E5;border-radius:8px;padding:11px 13px;font-size:14px;color:#000;line-height:1.5;transition:border-color .15s,box-shadow .15s}
input:focus,textarea:focus{outline:none;border-color:#8E47FF;box-shadow:0 0 0 3px rgba(142,71,255,.12)}
textarea{resize:vertical}
a{color:#8E47FF;text-decoration:none}
a:hover{text-decoration:underline}

/* ─── LAYOUT ────────────────────────────────────────────────────────────── */
.wrap{max-width:700px;margin:0 auto;padding:28px 20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ─── CARD ──────────────────────────────────────────────────────────────── */
.card{background:#fff;border:1.5px solid #E2E2E5;border-radius:12px;padding:20px;margin-bottom:14px}
.card.accent-purple{border-left:4px solid #8E47FF}
.card.accent-green{border-left:4px solid #34C759}
.card.accent-orange{border-left:4px solid #FF8F00}
.card.accent-grey{border-left:4px solid #7A7A7A}
.card.accent-blue{border-left:4px solid #5894F7}
.card.accent-red{border-left:4px solid #F5555A}

/* ─── TILES / CHIPS ─────────────────────────────────────────────────────── */
.tile{background:#fff;border:1.5px solid #E2E2E5;border-radius:10px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .13s;user-select:none;margin-bottom:0}
.tile:hover{border-color:#8E47FF;background:#FAF8FF}
.tile.sel{border-color:#8E47FF;background:rgba(142,71,255,.07)}
.tile .chk{width:20px;height:20px;border-radius:50%;border:2px solid #E2E2E5;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .13s;font-size:11px;color:#fff;font-weight:800}
.tile.sel .chk{background:#8E47FF;border-color:#8E47FF}
.tile-label{flex:1;font-weight:600;font-size:14px;color:#000;line-height:1.3}
.tile-sub{font-size:12px;color:#7A7A7A;margin-top:2px;font-weight:400}
.tile.sel .tile-label{color:#8E47FF}
/* color variants */
.tile.c-green.sel{border-color:#34C759;background:rgba(52,199,89,.07)} .tile.c-green.sel .tile-label{color:#34C759} .tile.c-green.sel .chk{background:#34C759;border-color:#34C759}
.tile.c-orange.sel{border-color:#FF8F00;background:rgba(255,143,0,.07)} .tile.c-orange.sel .tile-label{color:#FF8F00} .tile.c-orange.sel .chk{background:#FF8F00;border-color:#FF8F00}
.tile.c-blue.sel{border-color:#5894F7;background:rgba(88,148,247,.07)} .tile.c-blue.sel .tile-label{color:#5894F7} .tile.c-blue.sel .chk{background:#5894F7;border-color:#5894F7}
.tile.c-grey.sel{border-color:#7A7A7A;background:rgba(122,122,122,.07)} .tile.c-grey.sel .tile-label{color:#7A7A7A} .tile.c-grey.sel .chk{background:#7A7A7A;border-color:#7A7A7A}
.tile.c-teal.sel{border-color:#5BC1BB;background:rgba(91,193,187,.07)} .tile.c-teal.sel .tile-label{color:#5BC1BB} .tile.c-teal.sel .chk{background:#5BC1BB;border-color:#5BC1BB}
.tile.c-red.sel{border-color:#F5555A;background:rgba(245,85,90,.07)} .tile.c-red.sel .tile-label{color:#F5555A} .tile.c-red.sel .chk{background:#F5555A;border-color:#F5555A}

.chip{display:inline-flex;align-items:center;gap:5px;border:1.5px solid #E2E2E5;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .12s;user-select:none;background:#fff;color:#7A7A7A;font-weight:500;margin:0 6px 8px 0}
.chip:hover{border-color:#8E47FF;color:#8E47FF}
.chip.sel{border-color:#8E47FF;background:rgba(142,71,255,.09);color:#8E47FF;font-weight:600}

/* ─── BUTTONS ───────────────────────────────────────────────────────────── */
.btn{border-radius:9px;padding:12px 22px;font-weight:600;font-size:14px;border:1.5px solid transparent;display:inline-flex;align-items:center;gap:7px;justify-content:center;line-height:1}
.btn-primary{background:#8E47FF;color:#fff;border-color:#8E47FF}
.btn-outline{background:transparent;color:#8E47FF;border-color:#8E47FF}
.btn-ghost{background:transparent;color:#7A7A7A;border-color:#E2E2E5}
.btn-green{background:#34C759;color:#fff;border-color:#34C759}
.btn-blue{background:#5894F7;color:#fff;border-color:#5894F7}
.btn-sm{padding:8px 16px;font-size:12px;border-radius:7px}
.btn-lg{padding:15px 30px;font-size:15px;font-weight:700}
.btn-full{width:100%}
.btn-red-outline{background:transparent;color:#F5555A;border-color:#F5555A}

/* ─── LABELS ────────────────────────────────────────────────────────────── */
.lbl{font-size:11px;font-weight:700;color:#7A7A7A;text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;display:block}
.page-title{font-size:23px;font-weight:700;color:#000;letter-spacing:-.3px;margin-bottom:6px}
.page-sub{color:#7A7A7A;font-size:14px;line-height:1.6;margin-bottom:22px}
.section-head{font-size:11px;font-weight:700;color:#7A7A7A;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

/* ─── PROGRESS ──────────────────────────────────────────────────────────── */
.progress-wrap{margin-bottom:28px}
.progress-meta{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:#8E47FF;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.progress-bar{height:3px;background:#E2E2E5;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#8E47FF;border-radius:3px;transition:width .35s ease}

/* ─── STICKY HEADER ─────────────────────────────────────────────────────── */
.sticky-hdr{background:#fff;border-bottom:1px solid #E2E2E5;padding:13px 24px;position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-prospect{font-size:13px;font-weight:500;color:#7A7A7A}
.hdr-divider{width:1px;height:18px;background:#E2E2E5}

/* ─── SWIVL LOGO ────────────────────────────────────────────────────────── */
.swivl-logo{font-family:'Georgia',serif;font-style:italic;font-weight:700;color:#000;user-select:none;line-height:1}

/* ─── SIGNAL PULSE (live capture) ──────────────────────────────────────── */
.signal-badge{display:inline-block;background:#F5555A15;color:#F5555A;border:1px solid #F5555A40;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ─── RECOMMENDATION CARD ──────────────────────────────────────────────── */
.rec-card{border-radius:12px;padding:20px;margin-bottom:14px;border:2px solid transparent}
.rec-card.primary{border-color:#8E47FF;background:linear-gradient(135deg,rgba(142,71,255,.06),rgba(142,71,255,.02))}
.rec-card.secondary{border-color:#E2E2E5;background:#fff}

/* ─── NEXT STEP OPTION ──────────────────────────────────────────────────── */
.ns-option{border:1.5px solid #E2E2E5;border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:13px;cursor:pointer;transition:all .13s;margin-bottom:8px;background:#fff;user-select:none}
.ns-option:hover{border-color:#8E47FF;background:#FAF8FF}
.ns-option.sel{border-color:#8E47FF;background:rgba(142,71,255,.06)}
.ns-option.recommended{border-color:#8E47FF}
.ns-rec-badge{background:#8E47FF;color:#fff;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-left:8px;vertical-align:middle}
.ns-option .chk{width:20px;height:20px;border-radius:50%;border:2px solid #E2E2E5;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .13s;font-size:11px;color:#fff;font-weight:800}
.ns-option.sel .chk{background:#8E47FF;border-color:#8E47FF}

/* ─── SUMMARY ───────────────────────────────────────────────────────────── */
.sum-row{display:flex;gap:14px;padding:8px 0;border-bottom:1px solid #EBEBED;align-items:flex-start}
.sum-label{color:#7A7A7A;font-size:12px;font-weight:500;width:170px;flex-shrink:0;padding-top:1px}
.sum-value{color:#000;font-size:13px;line-height:1.5;flex:1}
.sum-value.hi{color:#8E47FF;font-weight:600}
.sum-value.green{color:#34C759;font-weight:600}
.sum-value.orange{color:#FF8F00;font-weight:600}

/* ─── NAV ROW ───────────────────────────────────────────────────────────── */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:18px;border-top:1px solid #E2E2E5}

/* ─── HOME ──────────────────────────────────────────────────────────────── */
.home-hero{text-align:center;padding:60px 20px 40px}
.home-steps{background:#fff;border-radius:14px;border:1.5px solid #E2E2E5;padding:24px 28px;margin-bottom:24px}
.home-step{display:flex;gap:15px;padding:12px 0;align-items:flex-start}
.home-step:not(:last-child){border-bottom:1px solid #EBEBED}
.step-num{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}

/* ─── RECORD CARD ───────────────────────────────────────────────────────── */
.rec-row{background:#fff;border:1.5px solid #E2E2E5;border-radius:12px;padding:18px 20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:14px}

/* ─── TAG ───────────────────────────────────────────────────────────────── */
.tag{display:inline-block;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase}

/* ─── DEPLOYMENT SNAPSHOT ──────────────────────────────────────────────── */
.deploy-box{background:linear-gradient(135deg,#FAF8FF,#F5F5F7);border:2px solid #8E47FF30;border-radius:14px;padding:22px;margin-bottom:14px}
.deploy-line{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #EBEBED;font-size:14px}
.deploy-line:last-child{border-bottom:none}
.deploy-total{font-size:18px;font-weight:700;color:#8E47FF;margin-top:12px}

/* ─── ANIMATIONS ────────────────────────────────────────────────────────── */
.fade{animation:fd .25s ease}
@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ─── PRINT ─────────────────────────────────────────────────────────────── */
@media print{
  .no-print{display:none!important}
  body{background:#fff;padding:0}
  .wrap{padding:10px}
  .card{break-inside:avoid;border:1px solid #ddd;box-shadow:none}
}

/* ─── RESPONSIVE ────────────────────────────────────────────────────────── */
@media(max-width:580px){
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════════════
   1. DATA
═══════════════════════════════════════════════════════════════════════════ */

const COLORS = {
  purple:'#8E47FF', blue:'#5894F7', orange:'#FF8F00',
  green:'#34C759', red:'#F5555A', teal:'#5BC1BB', grey:'#7A7A7A'
};

const EXPECTATIONS = [
  {id:'learn',   icon:'📚', label:'Learn what Swivl can do'},
  {id:'demo',    icon:'👁️',  label:'See it in action today'},
  {id:'fit',     icon:'🔍', label:'Understand if it fits our needs'},
  {id:'pricing', icon:'💬', label:'Get a general sense of investment'},
  {id:'compare', icon:'⚖️',  label:'See how it compares to what we use now'},
  {id:'buyin',   icon:'🤝', label:'Build support with our team'},
  {id:'grant',   icon:'🏷️', label:'Explore funding or grant alignment'},
  {id:'other',   icon:'✏️',  label:'Something specific — we can share'}
];

const PRIORITIES = [
  {id:'ell',      icon:'🌐', label:'ELL / Language support',          color:'teal', signal:'m2'},
  {id:'coaching', icon:'🎥', label:'Instructional coaching & video',  color:'blue', signal:'cx_or_m2'},
  {id:'mtss',     icon:'📋', label:'MTSS / documentation & evidence', color:'purple', signal:'m2'},
  {id:'pd',       icon:'🛠️', label:'Teacher professional development', color:'blue', signal:'m2'},
  {id:'student',  icon:'📈', label:'Student growth & outcomes',        color:'green', signal:'m2'},
  {id:'sel',      icon:'❤️',  label:'SEL & student wellbeing',         color:'red', signal:'m2'},
  {id:'assess',   icon:'📝', label:'Formative assessment',             color:'purple', signal:'m2'},
  {id:'reflect',  icon:'🪞', label:'Building a culture of reflection', color:'purple', signal:'m2'},
  {id:'screen',   icon:'📵', label:'Reducing screen dependence',       color:'orange', signal:'m2'},
  {id:'walkthru', icon:'👀', label:'Classroom walkthroughs & obs.',   color:'blue', signal:'cx_or_m2'},
  {id:'absentee', icon:'📊', label:'Chronic absenteeism / engagement', color:'orange', signal:'m2'},
  {id:'sped',     icon:'♿', label:'SPED / differentiated instruction', color:'teal', signal:'m2'}
];

const M2_FEATURES = [
  {id:'track',    icon:'📷', label:'180° auto-tracking camera'},
  {id:'audio',    icon:'🎙️', label:'High-quality audio, audio-first approach'},
  {id:'tips',     icon:'💡', label:'AI real-time tips & takeaways in class'},
  {id:'m2talk',   icon:'🤖', label:'One-touch M2 Talk (AI co-teacher)'},
  {id:'mirrortalk',icon:'🪞',label:'MirrorTalk student reflection & assessment'},
  {id:'summaries',icon:'📄', label:'End-of-class summaries for teachers'},
  {id:'activities',icon:'🎯',label:'Guided student activities & station work'},
  {id:'multidock', icon:'🔌',label:'Multi-dock / multi-remote group audio'},
  {id:'language',  icon:'🌐',label:'Language translation & ELL in-ear support'},
  {id:'dashboard', icon:'📊',label:'Admin dashboard & instructional insights'},
  {id:'sharing',   icon:'🔗',label:'Sharing class summaries with students/parents'},
  {id:'recording', icon:'🎬',label:'Video recording for coaching & reflection'}
];

const CX_FEATURES = [
  {id:'cx_track',  icon:'🤖', label:'Auto-tracking robot — follows the teacher'},
  {id:'cx_audio',  icon:'🎤', label:'Strong teacher audio + optional student mics'},
  {id:'cx_coach',  icon:'🎥', label:'Video playback for coaching conversations'},
  {id:'cx_simple', icon:'✅', label:'Simple, reliable — no AI, just video'},
  {id:'cx_reflect',icon:'🪞', label:'Reflectivity software for video coaching PD'},
  {id:'cx_existing',icon:'🔄',label:'We already have Swivl robots'}
];

const NEXT_STEPS = [
  {id:'virtual_demo',   icon:'💻', label:'Virtual M2 Demo',                     sub:'30-min live walkthrough — former educator leads, great for including your team',     rec_signals:['demo','learn','fit'],                   owner:'Jenn (CS)'},
  {id:'am_meeting',     icon:'📅', label:'2nd Meeting with Account Manager',    sub:'Discovery deep-dive and storyselling — AM tailors the conversation to your goals',    rec_signals:['pricing','fit','buyin'],                owner:'AM'},
  {id:'am_quote',       icon:'💰', label:'Formal Quote & Proposal Meeting',     sub:'AM builds a deployment model and quote based on everything we discussed today',       rec_signals:['pricing','ready'],                     owner:'AM'},
  {id:'onsite_trial',   icon:'🏫', label:'30-Day On-Site Trial',                sub:'Unit ships to you — brief kickoff call to set goals, select teachers, align on timing', rec_signals:['fit','hands_on','cx_existing'],       owner:'SDR + AM'},
  {id:'rep_visit',      icon:'👤', label:'Swivl Rep On-Site Visit',             sub:'We bring a unit to your location — you see it live in your building',                   rec_signals:['hands_on','demo','cx_or_m2'],          owner:'AM'},
  {id:'device_ship',    icon:'📦', label:'Demo Device Shipment (DDS)',          sub:'We ship a device to you to explore at your own pace — return in two weeks',            rec_signals:['fit','hands_on'],                      owner:'Rachel (CS)'},
  {id:'security',       icon:'🔒', label:'IT / Security Review Meeting',        sub:'Technical walkthrough for your IT team — we cover privacy, data, AI, compliance',     rec_signals:['security','mtss','district'],           owner:'AM + CS'},
  {id:'title1',         icon:'🏷️',  label:'Title I / Grant Funding Conversation', sub:'We help you map funding sources — Title I, ESSER, instructional grants',           rec_signals:['grant','budget','title1'],              owner:'AM'},
  {id:'pilot_mt',       icon:'🔬', label:'MirrorTalk 3-Week Pilot',             sub:'Small group of teachers test MirrorTalk — data-driven buy-in for the broader team',   rec_signals:['assess','student','reflect'],           owner:'AM'},
  {id:'cx_consult',     icon:'🤖', label:'Robot (CX) Consultation',             sub:'Walk through CX1/CX3/CX5 options, pricing, and whether M2 is a better fit',          rec_signals:['coaching','cx_track','walkthru'],       owner:'AM'},
  {id:'tradein',        icon:'🔄', label:'Robot Trade-In Program',              sub:'If you have existing Swivl robots, explore trade-in credit toward M2',                 rec_signals:['cx_existing','cx_track'],              owner:'AM'},
  {id:'new_contact',    icon:'👥', label:'Identify a New Champion / Contact',   sub:'Map the right decision-maker or implementer to keep momentum going',                  rec_signals:['buyin','district'],                    owner:'SDR'},
  {id:'nurture',        icon:'📬', label:'Stay Connected — Follow-Up in 30 Days', sub:'Not the right time now — we send relevant updates and check back in',              rec_signals:['not_ready'],                           owner:'AM (Salesloft)'}
];

/* ═══════════════════════════════════════════════════════════════════════════
   2. STATE
═══════════════════════════════════════════════════════════════════════════ */

let D = freshData(); // meeting data
let VIEW = 'home';   // home | meeting | records | summary
let STEP = 1;
let RECORDS = loadRecords();
let COPY_MSG = '';
let SAVED = false;
let ACTIVE_REC_ID = null;

function freshData() {
  return {
    // step 1
    name:'', org:'', role:'', grade:'', sdrName:'', date:todayStr(),
    // step 2
    expectations:[], source:'', notes_opening:'',
    // step 3 — live during brian's deck
    priorities:[], pain:'', budget_signal:'', scale:'',
    // step 4 — feature reactions
    m2_reactions:[], cx_reactions:[], reaction_notes:'', product_lean:'',
    // step 5 — context
    existing_tech:'', decision_timeline:'', security_concern:false, title1_interest:false, hands_on_interest:false,
    // step 6 — next steps
    chosen_steps:[],
    ns_notes:'', meeting_time:'', am_name:'',
    // computed
    deployment_model:null
  };
}

function loadRecords() {
  try { return JSON.parse(localStorage.getItem('swivl_v5') || '[]'); }
  catch(e) { return []; }
}

function saveRecords() {
  try { localStorage.setItem('swivl_v5', JSON.stringify(RECORDS)); }
  catch(e) {}
}

function todayStr() {
  return new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

/* ═══════════════════════════════════════════════════════════════════════════
   3. INPUT HANDLING — cursor-safe, no rerender on text input
═══════════════════════════════════════════════════════════════════════════ */

function hi(field, value) {
  D[field] = value;
  validateButtons();
}

function hiCheck(field, value) {
  D[field] = value === 'true';
  validateButtons();
}

function validateButtons() {
  const nextBtn = document.getElementById('next-btn');
  if (!nextBtn) return;
  if (STEP === 1) nextBtn.disabled = !(D.name.trim() && D.org.trim());
  else nextBtn.disabled = false;
}

function toggleArr(field, val) {
  const arr = D[field];
  const idx = arr.indexOf(val);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(val);
  render();
}

function setSingle(field, val) {
  D[field] = D[field] === val ? '' : val;
  render();
}

function toggleStep(id) {
  const arr = D.chosen_steps;
  const idx = arr.indexOf(id);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(id);
  render();
}

/* ═══════════════════════════════════════════════════════════════════════════
   4. SMART LOGIC ENGINE
═══════════════════════════════════════════════════════════════════════════ */

function computeProductLean() {
  // Signals strongly pointing to M2
  const m2Signals = [
    ...D.m2_reactions,
    ...D.priorities.filter(p => {
      const pr = PRIORITIES.find(x => x.id === p);
      return pr && pr.signal === 'm2';
    })
  ];
  // Signals pointing to CX
  const cxSignals = [
    ...D.cx_reactions,
    ...D.priorities.filter(p => ['coaching','walkthru'].includes(p))
  ];
  if (D.cx_reactions.includes('cx_existing')) return 'both';
  if (cxSignals.length > m2Signals.length) return 'cx';
  if (m2Signals.length >= 2) return 'm2';
  return 'unclear';
}

function computeRecommendedSteps() {
  const recommended = new Set();
  const lean = D.product_lean || computeProductLean();

  // Always surface a meeting or demo path
  if (D.expectations.includes('demo') || D.m2_reactions.length > 0)
    recommended.add('virtual_demo');

  if (D.expectations.includes('pricing') || D.budget_signal === 'ready')
    recommended.add('am_quote');
  else if (D.expectations.includes('fit') || D.priorities.length > 0)
    recommended.add('am_meeting');

  if (D.hands_on_interest || D.cx_reactions.includes('cx_existing'))
    recommended.add('onsite_trial');

  if (D.security_concern || D.priorities.includes('mtss') || D.scale === 'district')
    recommended.add('security');

  if (D.title1_interest || D.expectations.includes('grant'))
    recommended.add('title1');

  if (D.priorities.includes('assess') || D.priorities.includes('reflect') || D.m2_reactions.includes('mirrortalk'))
    recommended.add('pilot_mt');

  if (lean === 'cx' || D.cx_reactions.includes('cx_track') || D.priorities.includes('coaching'))
    recommended.add('cx_consult');

  if (D.cx_reactions.includes('cx_existing'))
    recommended.add('tradein');

  if (D.budget_signal === 'tight' || D.scale === 'small')
    recommended.add('title1');

  if (D.expectations.includes('buyin') || D.scale === 'district')
    recommended.add('new_contact');

  // Trim to top 3-4
  return [...recommended].slice(0,4);
}

function computeDeploymentModel() {
  const lean = D.product_lean || computeProductLean();
  const scale = D.scale || 'small';
  const name = D.org || 'your school';

  let model = { lean, items:[], note:'', disclaimer:'AM will build the formal quote based on your goals and priorities.' };

  if (lean === 'cx') {
    model.title = 'Swivl Robot (CX) Deployment';
    model.tagline = 'Video coaching & teacher reflection';
    model.items = [
      {label:'CX3 Robot (teacher + 2 student mics)', price:'$1,100', note:'per unit'},
      {label:'Tripod', price:'~$99', note:'per unit'},
      {label:'iPad (if needed)', price:'$300–$500', note:'per unit'},
      {label:'Reflectivity software', price:'$95/user/yr', note:'individual · program pricing available'},
    ];
    model.range = scale === 'district' ? '$15,000–$50,000+' : '$1,500–$4,000';
    model.starter = 'Fully configured CX3 unit ≈ $1,700–$1,900';
  } else if (lean === 'both') {
    model.title = 'M2 + CX Hybrid Path';
    model.tagline = 'Upgrade existing robots, expand with M2';
    model.items = [
      {label:'M2 hardware', price:'$2,250', note:'10% off MSRP'},
      {label:'MirrorTalk software (min. 3 licences)', price:'$250/teacher/yr', note:'+ free 60-day full-site trial'},
      {label:'CX Robot trade-in credit', price:'TBD', note:'AM to assess existing fleet'},
    ];
    model.range = scale === 'district' ? '$20,000–$75,000+' : '$3,000–$8,000';
    model.starter = '1 M2 + 3 MirrorTalk licences = $3,000 · free 60-day full-site licence included';
  } else {
    // m2 or unclear — default to M2
    model.title = 'M2 + MirrorTalk Deployment';
    model.tagline = 'AI-powered classroom co-teacher';
    model.items = [
      {label:'M2 hardware', price:'$2,250', note:'10% off $2,500 MSRP'},
      {label:'MirrorTalk software (min. 3 licences)', price:'$750/yr', note:'3 × $250 · free 60-day full-site trial included'},
      {label:'Starter Pack total', price:'$3,000', note:'hardware + software + free trial'},
    ];
    if (scale === 'pilot') {
      model.items.push({label:'Pilot (4–10 units)', price:'$12,000–$30,000', note:'program pricing applies'});
    } else if (scale === 'district') {
      model.items.push({label:'District-wide deployment', price:'Custom', note:'site licence significantly reduces per-user cost'});
    }
    model.range = scale === 'district' ? '$30,000–$100,000+' : '$3,000–$15,000';
    model.starter = 'Starter Pack: 1 M2 + 3 licences = $3,000 · 60-day free full-site licence for everyone in the building';
  }
  return model;
}

/* ═══════════════════════════════════════════════════════════════════════════
   5. HTML HELPERS
═══════════════════════════════════════════════════════════════════════════ */

function esc(s) {
  return (s||'').toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function logo(size) {
  return `<span class="swivl-logo" style="font-size:${size||24}px;">Swivl</span>`;
}

function tag(text, color) {
  return `<span class="tag" style="background:${color}18;color:${color};">${esc(text)}</span>`;
}

function renderTile(icon, label, sub, sel, onclick, colorClass, compact) {
  colorClass = colorClass || '';
  const subHtml = (sub && !compact) ? `<div class="tile-sub">${esc(sub)}</div>` : '';
  return `<div class="tile ${colorClass} ${sel?'sel':''}" onclick="${onclick}">
    ${icon ? `<span style="font-size:${compact?18:22}px;flex-shrink:0;">${icon}</span>` : ''}
    <div style="flex:1;"><div class="tile-label">${esc(label)}</div>${subHtml}</div>
    <div class="chk">${sel?'✓':''}</div>
  </div>`;
}

function renderChip(label, sel, onclick) {
  return `<span class="chip ${sel?'sel':''}" onclick="${onclick}">${sel?'✓ ':''}${esc(label)}</span>`;
}

function renderField(labelTxt, field, ph, multi) {
  const v = esc(D[field] || '');
  const st = 'margin-top:0;';
  if (multi) return `<div><span class="lbl">${labelTxt}</span><textarea rows="3" oninput="hi('${field}',this.value)" placeholder="${esc(ph)}" style="${st}">${v}</textarea></div>`;
  return `<div><span class="lbl">${labelTxt}</span><input type="text" value="${v}" oninput="hi('${field}',this.value)" placeholder="${esc(ph)}" style="${st}"></div>`;
}

function renderProgress(step, label) {
  const pct = Math.round(step / 7 * 100);
  const phases = ['Prospect','Context','Priorities','Reactions','Discovery','Next Steps','Summary'];
  return `<div class="progress-wrap">
    <div class="progress-meta">
      <span>Step ${step} of 7 — ${label}</span>
      <span>${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;gap:4px;margin-top:8px;">
      ${phases.map((p,i) => `<div style="flex:1;height:3px;border-radius:2px;background:${i<step?'#8E47FF':'#E2E2E5'};transition:background .3s;"></div>`).join('')}
    </div>
  </div>`;
}

function navRow(backFn, nextFn, nextLabel, disableNext, hideBack) {
  const back = hideBack ? '<div></div>' : `<button class="btn btn-ghost btn-sm" onclick="${backFn}">← Back</button>`;
  const next = `<button id="next-btn" class="btn btn-primary" onclick="${nextFn}" ${disableNext?'disabled':''}>${nextLabel||'Continue'} →</button>`;
  return `<div class="nav-row no-print">${back}${next}</div>`;
}

function stickyHeader() {
  const prospect = D.name ? `${esc(D.name)}${D.org ? ' · ' + esc(D.org) : ''}` : 'New Meeting';
  return `<div class="sticky-hdr no-print">
    <div class="hdr-left">
      ${logo(22)}
      <div class="hdr-divider"></div>
      <span class="hdr-prospect">${prospect}</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="exitMeeting()">✕ Exit</button>
  </div>`;
}

    <!-- DEPLOYMENT SNAPSHOT -->
    <div class="deploy-box">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
        <div>
          <div style="font-weight:700;font-size:16px;color:#000;margin-bottom:3px;">📐 ${esc(model.title)}</div>
          <div style="font-size:13px;color:#7A7A7A;">${esc(model.tagline)} · <em>${esc(D.org || 'this organization')}</em></div>
        </div>
        ${tag('Indicative Only', '#7A7A7A')}
      </div>
      ${deployItems}
      <div class="deploy-total">Starter path: ${esc(model.starter)}</div>
      <div style="font-size:12px;color:#7A7A7A;margin-top:8px;line-height:1.5;">${esc(model.disclaimer)}</div>
    </div>

    <!-- NEXT STEPS -->
    <div class="card" style="border-color:#34C75940;border-left:4px solid #34C759;background:#34C75904;">
      <div class="section-head" style="color:#34C759;">Agreed Next Steps</div>
      ${nextStepsList || '<div style="color:#7A7A7A;font-size:14px;padding:8px 0;">No steps selected — go back to Step 6 to choose.</div>'}
      ${D.ns_notes ? sumRow('Additional Notes', D.ns_notes) : ''}
      ${D.am_name ? sumRow('Account Manager', D.am_name) : ''}
    </div>

    <!-- ACTION BUTTONS -->
    <div class="no-print" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;">
      ${copyBtn}
      ${pdfBtn}
      ${saveBtn}
      ${newBtn}
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   7. VIEWS
═══════════════════════════════════════════════════════════════════════════ */

function viewHome() {
  const steps = [
    ['1', COLORS.purple, 'Set the stage', 'Prospect info in before or as the call starts.'],
    ['2', COLORS.blue,   'Open the conversation', 'Capture expectations and what brought them here.'],
    ['3', COLORS.orange, 'Track priorities live', 'As Brian presents, note what resonates in real time.'],
    ['4', '#2AAA6A',     'Log feature reactions', 'Tap what lights them up — M2, robot, both.'],
    ['5', COLORS.teal,   'Gather key context', 'Timeline, funding signals, existing tech.'],
    ['6', COLORS.green,  'Build their path', 'Smart next step recommendations based on what we heard.'],
    ['7', COLORS.grey,   'Handoff summary', 'Copy, export PDF, save — AM-ready in seconds.'],
  ];
  const stepsHtml = steps.map(([n,c,t,s],i,arr) => `
    <div class="home-step">
      <div class="step-num" style="background:${c}18;color:${c};">${n}</div>
      <div>
        <div style="font-weight:600;font-size:14px;margin-bottom:2px;">${t}</div>
        <div style="font-size:13px;color:#7A7A7A;">${s}</div>
      </div>
    </div>`).join('');

  const recsHtml = RECORDS.length === 0 ? '' : `
    <div style="font-size:13px;color:#7A7A7A;text-align:center;margin-top:12px;">
      <span onclick="VIEW='records';render();" style="color:#8E47FF;font-weight:600;cursor:pointer;">View ${RECORDS.length} saved meeting${RECORDS.length!==1?'s':''} →</span>
    </div>`;

  return `
    <div class="wrap">
      <div class="home-hero">
        ${logo(40)}
        <h1 style="font-size:28px;font-weight:700;letter-spacing:-.5px;margin:14px 0 10px;">Live Meeting Companion</h1>
        <p style="color:#7A7A7A;font-size:15px;line-height:1.7;max-width:480px;margin:0 auto;">
          Fill this out live during every first meeting with Brian. 
          Questions adapt as you capture — ends with a personalized 
          next-step plan and AM-ready handoff.
        </p>
      </div>
      <div class="home-steps">
        <span class="lbl">Meeting flow — 7 steps</span>
        ${stepsHtml}
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary btn-lg" onclick="newMeeting()">▶ Start New Meeting</button>
        ${RECORDS.length > 0 ? `<button class="btn btn-outline btn-lg" onclick="VIEW='records';render();">📁 Records (${RECORDS.length})</button>` : ''}
      </div>
      ${recsHtml}
    </div>`;
}

function viewMeeting() {
  const steps = [null, step1, step2, step3, step4, step5, step6, step7];
  const fn = steps[STEP];
  const content = fn ? fn() : '';
  return stickyHeader() + `<div class="wrap fade">${content}</div>`;
}

function viewRecords() {
  const bColor = b => b==='buy'||b==='ready'?COLORS.green:b==='pilot'||b==='exploring'?COLORS.orange:COLORS.grey;
  const bLabel = b => {
    const map = {ready:'Ready to Buy',exploring:'Exploring',grant:'Grant/Title I',tight:'Budget Sensitive',budget_cycle:'In Budget Cycle'};
    return map[b] || 'Discovery';
  };
  const rows = RECORDS.length === 0
    ? `<div style="text-align:center;padding:40px;color:#7A7A7A;font-size:14px;">No meetings saved yet.</div>`
    : RECORDS.map((r,i) => `
      <div class="rec-row">
        <div style="flex:1;">
          <div style="font-weight:600;font-size:16px;margin-bottom:3px;">${esc(r.data.name||'Unknown')}</div>
          <div style="font-size:13px;color:#7A7A7A;">${esc(r.data.org||'—')}${r.data.role?' · '+esc(r.data.role):''}${r.data.date?' · '+esc(r.data.date):''}</div>
          <div style="margin-top:7px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;">
            ${tag(bLabel(r.data.budget_signal), bColor(r.data.budget_signal))}
            ${r.data.sdrName ? `<span style="font-size:12px;color:#7A7A7A;">SDR: ${esc(r.data.sdrName)}</span>` : ''}
            ${r.data.chosen_steps?.length ? `<span style="font-size:12px;color:#8E47FF;font-weight:600;">${r.data.chosen_steps.length} next step${r.data.chosen_steps.length!==1?'s':''}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;">
          <button class="btn btn-primary btn-sm" onclick="loadRecord(${i})">View</button>
          <button class="btn btn-red-outline btn-sm" onclick="deleteRecord(${i})">Delete</button>
        </div>
      </div>`).join('');

  return `
    <div style="background:#fff;border-bottom:1px solid #E2E2E5;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;">
      ${logo(24)}
      <button class="btn btn-ghost btn-sm" onclick="VIEW='home';render();">← Back</button>
    </div>
    <div class="wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">
        <div>
          <h2 style="font-size:22px;font-weight:700;">Meeting Records</h2>
          <p style="color:#7A7A7A;font-size:13px;margin-top:3px;">${RECORDS.length} saved meeting${RECORDS.length!==1?'s':''}</p>
        </div>
      </div>
      ${rows}
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   8. ACTIONS
═══════════════════════════════════════════════════════════════════════════ */

function render() {
  const app = document.getElementById('app');
  if (!app) return;
  if (VIEW === 'home')    app.innerHTML = viewHome();
  else if (VIEW === 'records') app.innerHTML = viewRecords();
  else                    app.innerHTML = viewMeeting();
  validateButtons();
}

function newMeeting() {
  D = freshData();
  STEP = 1;
  SAVED = false;
  COPY_MSG = '';
  ACTIVE_REC_ID = null;
  VIEW = 'meeting';
  render();
  window.scrollTo(0,0);
}

function nextStep() {
  if (STEP === 1 && !(D.name.trim() && D.org.trim())) return;
  if (STEP === 6 && D.chosen_steps.length === 0) return;
  if (STEP < 7) { STEP++; render(); window.scrollTo(0,0); }
}

function prevStep() {
  if (STEP > 1) { STEP--; render(); window.scrollTo(0,0); }
}

function exitMeeting() {
  if (!D.name && !D.org) { VIEW = 'home'; render(); return; }
  if (confirm('Exit this meeting? Any unsaved notes will stay until you start a new one.')) {
    VIEW = 'home'; render();
  }
}

function saveRecord() {
  const existing = ACTIVE_REC_ID ? RECORDS.findIndex(r => r.id === ACTIVE_REC_ID) : -1;
  if (existing >= 0) {
    RECORDS[existing] = { id: ACTIVE_REC_ID, savedAt: Date.now(), data: Object.assign({}, D) };
  } else {
    const id = uid();
    ACTIVE_REC_ID = id;
    RECORDS.unshift({ id, savedAt: Date.now(), data: Object.assign({}, D) });
  }
  saveRecords();
  SAVED = true;
  render();
}

function loadRecord(idx) {
  const rec = RECORDS[idx];
  if (!rec) return;
  D = Object.assign(freshData(), rec.data);
  ACTIVE_REC_ID = rec.id;
  STEP = 7;
  SAVED = true;
  COPY_MSG = '';
  VIEW = 'meeting';
  render();
  window.scrollTo(0,0);
}

function deleteRecord(idx) {
  if (!confirm('Delete this meeting record?')) return;
  RECORDS.splice(idx, 1);
  saveRecords();
  render();
}

function buildHandoffText() {
  const lean = D.product_lean || computeProductLean();
  const model = computeDeploymentModel();
  const chosenStepData = D.chosen_steps.map(id => NEXT_STEPS.find(n => n.id === id)).filter(Boolean);
  const expectations = D.expectations.map(id => EXPECTATIONS.find(e=>e.id===id)?.label).filter(Boolean).join(', ');
  const priorities = D.priorities.map(id => PRIORITIES.find(p=>p.id===id)?.label).filter(Boolean).join(', ');
  const m2feats = D.m2_reactions.map(id => M2_FEATURES.find(f=>f.id===id)?.label).filter(Boolean).join(', ');
  const cxfeats = D.cx_reactions.map(id => CX_FEATURES.find(f=>f.id===id)?.label).filter(Boolean).join(', ');

  const lines = [
    'SWIVL MEETING HANDOFF — ' + (D.date||todayStr()).toUpperCase(),
    '─────────────────────────────────────',
    '',
    'PROSPECT',
    `  Name:              ${D.name||'N/A'}`,
    `  Organization:      ${D.org||'N/A'}`,
    `  Role:              ${D.role||'N/A'}`,
    `  Grades/Students:   ${D.grade||'N/A'}`,
    `  Lead Source:       ${D.source||'N/A'}`,
    `  SDR:               ${D.sdrName||'N/A'}`,
    '',
    'DISCOVERY',
    `  Expectations:      ${expectations||'N/A'}`,
    `  Top of Mind:       ${D.notes_opening||'N/A'}`,
    `  Priorities:        ${priorities||'N/A'}`,
    `  Pain Point:        ${D.pain||'N/A'}`,
    `  Budget Signal:     ${D.budget_signal||'N/A'}`,
    `  Timeline:          ${D.decision_timeline||'N/A'}`,
    `  Scale:             ${D.scale||'N/A'}`,
    '',
    'REACTIONS',
    `  M2 Features:       ${m2feats||'N/A'}`,
    `  CX/Robot Interest: ${cxfeats||'N/A'}`,
    `  Reaction Notes:    ${D.reaction_notes||'N/A'}`,
    `  Product Direction: ${model.title}`,
    `  IT/Security:       ${D.security_concern?'Yes — came up in conversation':'No'}`,
    `  Title I/Grant:     ${D.title1_interest?'Yes — relevant to this prospect':'No'}`,
    `  Existing Tech:     ${D.existing_tech||'N/A'}`,
    '',
    'INDICATIVE DEPLOYMENT',
    `  Path:              ${model.title} — ${model.tagline}`,
    `  Starter:           ${model.starter}`,
    `  Range:             ${model.range} (AM to formalize)`,
    '',
    'AGREED NEXT STEPS',
    ...chosenStepData.map(ns => `  ${ns.icon} ${ns.label} (${ns.owner})` + (D.meeting_time && ns.id!=='nurture' ? ` — ${D.meeting_time}` : '')),
    D.am_name ? `  AM Assigned: ${D.am_name}` : '',
    D.ns_notes ? `  Notes: ${D.ns_notes}` : '',
    '',
    '─────────────────────────────────────',
    'Swivl · swivl.com',
  ].filter(l => l !== null);

  return lines.join('\n');
}

function copyHandoff() {
  const text = buildHandoffText();
  function done() { COPY_MSG = '✓ Copied!'; render(); setTimeout(() => { COPY_MSG = ''; render(); }, 2500); }
  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch(e) { alert('Please copy manually:\n\n' + text); }
    document.body.removeChild(ta);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  } else { fallback(); }
}

function exportPDF() {
  const lean = D.product_lean || computeProductLean();
  const model = computeDeploymentModel();
  const chosenStepData = D.chosen_steps.map(id => NEXT_STEPS.find(n => n.id === id)).filter(Boolean);
  const expectations = D.expectations.map(id => EXPECTATIONS.find(e=>e.id===id)?.label).filter(Boolean).join(', ');
  const priorities = D.priorities.map(id => PRIORITIES.find(p=>p.id===id)?.label).filter(Boolean).join(', ');
  const m2feats = D.m2_reactions.map(id => M2_FEATURES.find(f=>f.id===id)?.label).filter(Boolean).join(', ');
  const cxfeats = D.cx_reactions.map(id => CX_FEATURES.find(f=>f.id===id)?.label).filter(Boolean).join(', ');

  function r(label, val) {
    if (!val) return '';
    return `<tr><td style="color:#7A7A7A;font-size:12px;padding:7px 10px 7px 0;width:180px;vertical-align:top;border-bottom:1px solid #EBEBED;font-weight:500;">${label}</td><td style="font-size:13px;padding:7px 0;border-bottom:1px solid #EBEBED;line-height:1.5;">${val}</td></tr>`;
  }
  function sec(title, rows) {
    return `<div style="background:#fff;border:1.5px solid #E2E2E5;border-radius:10px;padding:18px 20px;margin-bottom:12px;"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#7A7A7A;margin-bottom:10px;">${title}</div><table style="width:100%;border-collapse:collapse;">${rows}</table></div>`;
  }

  const deployItemsHtml = model.items.map(i =>
    `<tr><td style="font-size:13px;padding:7px 0;border-bottom:1px solid #EBEBED;">${i.label}</td><td style="font-size:13px;padding:7px 0;border-bottom:1px solid #EBEBED;text-align:right;color:#8E47FF;font-weight:600;">${i.price} <span style="color:#7A7A7A;font-weight:400;font-size:11px;">${i.note}</span></td></tr>`
  ).join('');

  const nsHtml = chosenStepData.map(ns =>
    `<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #EBEBED;align-items:flex-start;">
      <span style="font-size:18px;">${ns.icon}</span>
      <div><div style="font-weight:600;font-size:14px;">${ns.label}</div>
      <div style="font-size:12px;color:#7A7A7A;margin-top:2px;">${ns.sub}</div>
      ${D.meeting_time && ns.id!=='nurture' ? `<div style="font-size:12px;color:#34C759;font-weight:600;margin-top:2px;">📅 ${D.meeting_time}</div>` : ''}
      <div style="font-size:11px;color:#B0B0C0;margin-top:2px;">Owner: ${ns.owner}</div></div>
    </div>`
  ).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>Swivl Handoff — ${D.name||'Prospect'}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'Inter',-apple-system,sans-serif;background:#fff;color:#000;padding:40px;max-width:820px;margin:0 auto;-webkit-font-smoothing:antialiased}
      .btn{background:#8E47FF;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-block;margin-top:20px}
      @media print{.btn{display:none!important}body{padding:20px}}
    </style>
    </head><body>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #E2E2E5;">
      <div>
        <h1 style="font-size:24px;font-weight:700;margin-bottom:6px;">Meeting Handoff Summary</h1>
        <div style="color:#7A7A7A;font-size:13px;">${D.date||todayStr()} · ${D.sdrName||'Swivl SDR'}</div>
      </div>
      <div style="font-family:Georgia,serif;font-style:italic;font-weight:700;font-size:28px;">Swivl</div>
    </div>
    ${sec('Prospect', r('Name',D.name)+r('Organization',D.org)+r('Role',D.role)+r('Grades',D.grade)+r('Lead Source',D.source))}
    ${sec('Discovery', r('Expectations',expectations)+r('Top of Mind',D.notes_opening)+r('Priorities',priorities)+r('Pain Point',D.pain)+r('Budget Signal',D.budget_signal)+r('Timeline',D.decision_timeline)+r('Scale',D.scale))}
    ${sec('Reactions', r('M2 Features',m2feats)+r('CX/Robot Interest',cxfeats)+r('Notes',D.reaction_notes)+r('IT/Security',D.security_concern?'Yes — came up':'')+r('Title I/Grant',D.title1_interest?'Yes — relevant':''))}
    <div style="background:linear-gradient(135deg,#FAF8FF,#F5F5F7);border:2px solid rgba(142,71,255,.2);border-radius:12px;padding:20px;margin-bottom:12px;">
      <div style="font-weight:700;font-size:16px;margin-bottom:4px;">📐 ${model.title}</div>
      <div style="font-size:13px;color:#7A7A7A;margin-bottom:14px;">${model.tagline} · ${D.org||'this organization'}</div>
      <table style="width:100%;border-collapse:collapse;">${deployItemsHtml}</table>
      <div style="font-size:15px;font-weight:700;color:#8E47FF;margin-top:12px;">Starter path: ${model.starter}</div>
      <div style="font-size:12px;color:#7A7A7A;margin-top:6px;">${model.disclaimer}</div>
    </div>
    <div style="background:#fff;border:1.5px solid rgba(52,199,89,.4);border-left:4px solid #34C759;border-radius:10px;padding:18px 20px;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#34C759;margin-bottom:12px;">Agreed Next Steps</div>
      ${nsHtml||'<div style="color:#7A7A7A;font-size:14px;">None captured</div>'}
      ${D.am_name?`<div style="margin-top:10px;font-size:13px;"><strong>AM:</strong> ${D.am_name}</div>`:''}
    </div>
    <div style="text-align:center;margin-top:28px;padding-top:16px;border-top:1px solid #E2E2E5;">
      <div style="font-size:12px;color:#7A7A7A;margin-bottom:12px;">Swivl · swivl.com · A reflective technology company</div>
      <button class="btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
    </div>
    </body></html>`;

  const w = window.open('', '_blank');
  if (w) { w.document.write(html); w.document.close(); setTimeout(() => w.print(), 900); }
  else { alert('Pop-ups are blocked. Please allow pop-ups to use PDF export.'); }
}
