<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Swivl · SDR Meeting Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="icon" href="https://www.swivl.com/wp-content/uploads/2025/03/swivl-designmark-67c9a53c6ab0d.webp" type="image/webp"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,sans-serif;background:#F5F5F7;color:#000;-webkit-font-smoothing:antialiased;min-height:100vh}
input,textarea,button,select{font-family:inherit;font-size:inherit}
button{cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.35}
textarea{resize:vertical}
input:focus,textarea:focus,select:focus{outline:none;border-color:#8E47FF!important;box-shadow:0 0 0 3px rgba(142,71,255,.12)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#DDD;border-radius:3px}

/* Layout */
.wrap{max-width:680px;margin:0 auto;padding:28px 20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.step-in{animation:si .15s ease}
@keyframes si{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Topbar */
.topbar{background:#fff;border-bottom:1.5px solid #E8E8ED;position:sticky;top:0;z-index:20;
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand-ctx{font-size:13px;color:#7A7A7A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:12px;
  padding-left:12px;border-left:1px solid #E8E8ED}

/* Buttons */
.btn{border-radius:10px;border:1.5px solid #E8E8ED;padding:10px 18px;font-size:13px;font-weight:700;
  line-height:1;background:#F5F5F7;color:#7A7A7A;transition:filter .12s,background .12s}
.btn:hover:not(:disabled){filter:brightness(.96)}
.btn.p{background:#8E47FF;border-color:#8E47FF;color:#fff}
.btn.o{background:transparent;color:#000;border-color:#E8E8ED}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:8px}
.btn.danger{background:transparent;border-color:#F5555A;color:#F5555A}

/* Cards */
.card{background:#fff;border:1.5px solid #E8E8ED;border-radius:14px;padding:18px;margin-bottom:12px}
.card.hl{border-left:3px solid #8E47FF}
.lbl{color:#7A7A7A;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px}
.h2{font-size:21px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.sub{color:#7A7A7A;font-size:14px;line-height:1.55}

/* Inputs */
.in{width:100%;background:#fff;border:1.5px solid #E8E8ED;border-radius:10px;padding:10px 12px;
  font-size:14px;line-height:1.5;color:#000;transition:border-color .12s}
select.in{cursor:pointer}

/* Progress */
.prog{margin-bottom:22px}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.prog-label{font-size:12px;font-weight:700;color:#8E47FF}
.prog-pct{font-size:12px;color:#7A7A7A}
.prog-bar{height:3px;background:#EBEBED;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#8E47FF;border-radius:3px;transition:width .25s}

/* Tiles — ONE color scheme only (purple when selected, neutral otherwise) */
.tiles{display:grid;gap:8px}
.tiles.two{grid-template-columns:1fr 1fr}
.tile{background:#fff;border:1.5px solid #E8E8ED;border-radius:12px;padding:12px 14px;
  display:flex;gap:12px;align-items:flex-start;cursor:pointer;
  transition:border-color .13s,background .13s;user-select:none}
.tile:hover{border-color:#C4A0FF}
.tile.sel{border-color:#8E47FF;background:rgba(142,71,255,.06)}
.tile-body{flex:1;min-width:0}
.tile-title{font-size:14px;font-weight:700;color:#000;line-height:1.25}
.tile-sub{font-size:12px;color:#7A7A7A;margin-top:3px;line-height:1.35}
.tile.sel .tile-title{color:#8E47FF}
.tile-dot{width:18px;height:18px;border-radius:50%;border:2px solid #DDD;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;transition:all .13s}
.tile.sel .tile-dot{border-color:#8E47FF;background:#8E47FF}
.tile-dot .ck{font-size:9px;font-weight:900;color:#fff}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;gap:5px;background:#F5F5F7;border:1.5px solid #E8E8ED;
  border-radius:999px;padding:7px 13px;font-size:13px;color:#7A7A7A;cursor:pointer;
  transition:all .13s;user-select:none}
.chip:hover{border-color:#C4A0FF}
.chip.sel{border-color:#8E47FF;background:rgba(142,71,255,.08);color:#8E47FF;font-weight:700}
.chip.sel::before{content:'✓ ';font-size:10px;font-weight:900}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:10px;
  font-weight:800;letter-spacing:.8px;text-transform:uppercase}
.tag.A{background:rgba(52,199,89,.15);color:#1A9440}
.tag.B{background:rgba(142,71,255,.14);color:#8E47FF}
.tag.C{background:rgba(255,143,0,.14);color:#CC7200}
.tag.D{background:rgba(245,85,90,.14);color:#D4262B}

/* Callout */
.callout{background:rgba(142,71,255,.05);border:1.5px solid rgba(142,71,255,.20);border-radius:12px;
  padding:14px 16px;margin-bottom:12px}
.callout h4{font-size:13px;font-weight:800;margin-bottom:4px}
.callout p{font-size:13px;color:#555;line-height:1.55}

/* Gates (clarity checklist) */
.gate{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;
  border-radius:9px;border:1px solid #EBEBED;background:#fff;margin-bottom:6px}
.gate b{font-size:13px}
.ok{color:#1A9440;font-size:12px;font-weight:800}
.miss{color:#CC7200;font-size:12px;font-weight:800}

/* Summary rows */
.sr{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid #F2F2F5}
.sr:last-child{border-bottom:0}
.sr-l{font-size:11px;color:#7A7A7A;font-weight:600;width:180px;flex-shrink:0;padding-top:1px}
.sr-v{font-size:13px;line-height:1.5}

/* Calendar */
.cal-wrap{margin-top:8px}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-nav button{background:none;border:1.5px solid #E8E8ED;border-radius:8px;padding:5px 10px;
  font-size:13px;cursor:pointer;color:#000}
.cal-nav button:hover{border-color:#8E47FF;color:#8E47FF}
.cal-month{font-size:14px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-hdr{font-size:10px;font-weight:700;color:#7A7A7A;text-align:center;padding:4px 0}
.cal-day{font-size:13px;text-align:center;padding:7px 4px;border-radius:8px;cursor:pointer;
  border:1.5px solid transparent;transition:all .12s;line-height:1}
.cal-day:hover:not(.cal-past):not(.cal-empty){border-color:#C4A0FF;background:rgba(142,71,255,.06)}
.cal-day.cal-sel{background:#8E47FF;color:#fff;border-color:#8E47FF;font-weight:700}
.cal-day.cal-past{color:#CCC;cursor:default}
.cal-day.cal-empty{cursor:default}
.cal-day.cal-today{border-color:#8E47FF;color:#8E47FF;font-weight:700}

/* Email editor */
.email-editor{width:100%;min-height:320px;background:#fff;border:1.5px solid #E8E8ED;border-radius:12px;
  padding:16px;font-size:14px;line-height:1.65;color:#000;resize:vertical}
.email-subject{width:100%;background:#fff;border:1.5px solid #E8E8ED;border-radius:10px;
  padding:10px 14px;font-size:14px;font-weight:600;color:#000;margin-bottom:8px}

/* Nav row */
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:20px;
  padding-top:14px;border-top:1px solid #E8E8ED;gap:12px}

/* Toast */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:#000;color:#fff;
  padding:10px 18px;border-radius:999px;font-size:13px;z-index:99;opacity:0;pointer-events:none;transition:opacity .15s}
.toast.show{opacity:.92}

/* Records */
.rec{background:#fff;border:1.5px solid #E8E8ED;border-radius:12px;padding:16px;margin-bottom:10px}

@media(max-width:680px){.grid2{grid-template-columns:1fr}.tiles.two{grid-template-columns:1fr}.brand-ctx{display:none}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
/* ─── BRAND ─────────────────────────────────────────────────────── */
var WM='https://www.swivl.com/wp-content/uploads/2025/03/swivl-wordmark-black-67c9a53d10afa.webp';
function wm(h){return'<img src="'+WM+'" alt="Swivl" style="height:'+h+'px;width:auto;display:block"/>';}

/* ─── DATA DEFINITIONS ───────────────────────────────────────────── */
var MISSIONS=[
  {id:'instruction', label:'Improving instruction quality'},
  {id:'language',    label:'Supporting language learners (ELL/ML)'},
  {id:'growth',      label:'Teacher growth & PD'},
  {id:'coaching',    label:'Instructional coaching & observation'},
  {id:'participation',label:'Increasing student participation'},
  {id:'feedback',    label:'Less-judgmental teacher feedback'},
  {id:'alignment',   label:'School or district-wide alignment'},
  {id:'screens',     label:'Reducing screen dependence'},
  {id:'sel',         label:'SEL & student wellbeing'},
  {id:'recording',   label:'Video recording (boards, ed TPA, etc.)'},
  {id:'other',       label:'Other'}
];

var M2_FEATS=[
  {id:'tips',      label:'Live teacher tips',             desc:'Tap the screen mid-class — instant suggestions for participation, transitions, checks for understanding'},
  {id:'guides',    label:'Lesson guides',                 desc:'One tap generates a whole-class or small-group activity, no planning required'},
  {id:'ell',       label:'Language learner support',      desc:'In-ear translation for up to 9 students in 140+ languages; on-demand whole-class translation'},
  {id:'feedback',  label:'Post-class feedback report',    desc:'Auto-generated: teaching breakdown, participation data, framework scores — private to the teacher first'},
  {id:'takeaways', label:'Takeaways & exit tickets',      desc:'Summaries, formative assessments, and suggested next-class activities'},
  {id:'rubrics',   label:'Admin rubrics & frameworks',    desc:'District standards and evaluation rubrics loaded on the back end — everyone scored on the same criteria'},
  {id:'recording', label:'Flexible recording',            desc:'Active or silent observer mode. Drop-in replacement for current Swivl robots'},
  {id:'coaching',  label:'Share with coaches & admin',    desc:'Teacher controls sharing — reports can go to coaches and admin to support PD'}
];
var FEAT_LIMIT=3;

var PRODUCTS=[
  {id:'m2',      label:'M2'},
  {id:'m2talk',  label:'M2Talk'},
  {id:'bundle',  label:'M2 + M2Talk bundle'},
  {id:'reflect', label:'Reflectivity'},
  {id:'upgrade', label:'Upgrade from existing Swivl robots'},
  {id:'other',   label:'Other / still exploring'}
];

var CURR_SWIVL=[
  {id:'active',    label:'Yes — active users',         sub:'Recording, coaching, PD'},
  {id:'underused', label:'Yes — underutilized',        sub:'Mostly a recording stand or checkout model'},
  {id:'no',        label:'No — new to Swivl',          sub:'No existing hardware'},
  {id:'unknown',   label:'Unknown',                    sub:''}
];

var COACHING=[
  {id:'active',  label:'Yes — active video coaching program', sub:'Teachers record and reflect regularly'},
  {id:'partial', label:'Some — limited or inconsistent',      sub:'A few coaches use it; not systematic'},
  {id:'no',      label:'No — not currently a practice',       sub:'Feedback is observation-based only'},
  {id:'open',    label:'No — but want to build this',         sub:'Leadership sees this as a goal'}
];

var ELL=[
  {id:'significant', label:'Yes — significant ELL/ML population', sub:'Translation is a must-have'},
  {id:'some',        label:'Yes — some ELL students',             sub:'Translation could differentiate'},
  {id:'no',          label:'No / very few',                       sub:'Language features not a priority'},
  {id:'unknown',     label:'Unknown',                             sub:''}
];

var TIMELINES=[
  {id:'0-30',   label:'Within 30 days'},
  {id:'30-90',  label:'1–3 months'},
  {id:'90-180', label:'3–6 months'},
  {id:'thisyr', label:'This school year'},
  {id:'nextyr', label:'Next school year'},
  {id:'unknown',label:'Still exploring / not sure'}
];

var BUDGET=[
  {id:'now',    label:'Budget available now'},
  {id:'nextq',  label:'Next quarter'},
  {id:'nextfy', label:'Next fiscal year'},
  {id:'grant',  label:'Grant pending'},
  {id:'unknown',label:'Unknown'}
];

var STAKEHOLDER_ROLES=[
  'IT / Security','Procurement','Finance',
  'Curriculum & Instruction','Instructional coaches',
  'Principal(s)','Superintendent','Board','Other'
];

var SECURITY=[
  {id:'dpa',    label:'Data Privacy Agreement (DPA)'},
  {id:'ferpa',  label:'FERPA / COPPA review'},
  {id:'vendor', label:'Vendor approval forms'},
  {id:'sso',    label:'SSO / rostering'},
  {id:'rfp',    label:'RFP / bidding process'},
  {id:'none',   label:'None identified yet'}
];

// Routes — only relevant ones for a discovery call
var ROUTES=[
  {id:'pilot',       label:'Pilot / trial',                   sub:'Get devices on-site, schedule training. Lock a date.'},
  {id:'quote',       label:'Pricing / quote meeting',         sub:'They want numbers. Route to AM with a scheduled meeting.'},
  {id:'stakeholder', label:'Bring in a missing stakeholder',  sub:'The right person wasn\'t here. Next meeting = get them in the room.'},
  {id:'nurture',     label:'Budget nurture',                  sub:'They\'re interested but timing is off. Set a real re-engage date.'},
  {id:'unsure',      label:'Need more information',           sub:'Missing a core answer. Schedule a short follow-up to get it.'}
];

/* ─── STATE ──────────────────────────────────────────────────────── */
var LS={rec:'swivl_v4_rec',prof:'swivl_v4_prof'};
function loadProf(){try{return JSON.parse(localStorage.getItem(LS.prof)||'{}')||{};}catch(e){return{};}}
function saveProf(){try{localStorage.setItem(LS.prof,JSON.stringify(S.profile));}catch(e){}}
function loadRecs(){try{return JSON.parse(localStorage.getItem(LS.rec)||'[]')||[];}catch(e){return[];}}
function saveRecs(){try{localStorage.setItem(LS.rec,JSON.stringify(S.records));}catch(e){}}

function fresh(){
  var t=new Date(),cl=new Date();cl.setDate(cl.getDate()+90);
  function iso(d){function p(n){return(n<10?'0':'')+n;}return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
  return{
    meetingDate:t.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    closeDate:iso(cl),
    sdrName:'',sdrEmail:'',leadSource:'',
    name:'',role:'',email:'',org:'',attendees:'',meetingType:'brian',
    missions:[],missionOther:'',pain:'',success:'',
    currentSwivl:'',swivlCount:'',swivlUse:'',
    coachingPractice:'',ellPop:'',
    products:[],productOther:'',contextNotes:'',
    features:[],reaction:'',
    timeline:'',timelineNotes:'',
    budget:'',budgetNotes:'',budgetDate:'',
    dmName:'',dmRole:'',dmPresent:'',
    stakeholderRoles:[],stakeholderNames:'',
    securityNeeds:[],securityNotes:'',privacyDocsNeeded:'',
    route:'',
    nextType:'',nextDate:'',nextNotes:'',
    amName:'',
    pilotType:'',pilotStart:'',pilotSchools:'',
    nurtureDate:'',nurtureCategory:'',
    unsureMissing:'',
    emailSubject:'',emailBody:''
  };
}

var S={view:'home',step:1,data:fresh(),profile:loadProf(),records:loadRecs(),id:null,saved:false};
(function(){var p=S.profile;if(p.sdrName)S.data.sdrName=p.sdrName;if(p.sdrEmail)S.data.sdrEmail=p.sdrEmail;if(p.leadSource)S.data.leadSource=p.leadSource;})();

/* ─── UTILS ──────────────────────────────────────────────────────── */
function byId(arr,id){for(var i=0;i<arr.length;i++)if(arr[i].id===id)return arr[i];return null;}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function trim(s){return(s||'').toString().trim();}
function arr(a){return Array.isArray(a)?a:[];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function lbl(list,id){if(!id)return'';var o=byId(list,id);return o?o.label:id;}

/* ─── QUALIFICATION ───────────────────────────────────────────────── */
function qual(d){
  d=d||S.data;var s=0,m=[];
  if(trim(d.pain)){s+=2;}else{m.push('Pain point');}
  if(arr(d.missions).length){s+=1;}else{m.push('Mission priority');}
  if(arr(d.products).length){s+=1;}else{m.push('Solutions discussed');}
  if(trim(d.dmName)){s+=2;}else{m.push('Decision maker name');}
  if(trim(d.timeline)){s+=2;}else{m.push('Timeline');}
  if(trim(d.budget)||trim(d.budgetNotes)){s+=2;}else{m.push('Budget timing');}
  if(arr(d.stakeholderRoles).length||trim(d.stakeholderNames)){s+=1;}else{m.push('Stakeholders');}
  if(arr(d.securityNeeds).length||trim(d.securityNotes)){s+=1;}else{m.push('Security/DPA');}
  if(trim(d.route)){s+=1;}else{m.push('Route');}
  if(trim(d.nextDate)){s+=2;}else{m.push('Next meeting date');}
  var t='D';if(s>=12)t='A';else if(s>=9)t='B';else if(s>=6)t='C';
  return{score:s,tier:t,missing:m};
}

function recNext(){
  var d=S.data,r=d.route;
  var rec={head:'Lock in a clear next meeting.',why:'Speed beats goodwill. Get a date while momentum exists.',ask:'Confirm decision maker, timeline, and budget window.'};
  if(r==='pilot'){rec.head='Pilot path: lock the date and plan.';rec.why='Pilots die without dates. Put training and device delivery on the calendar now.';rec.ask='Confirm who participates, which grade levels, and what success looks like. Get training scheduled.';}
  if(r==='quote'){rec.head='Quote path: schedule pricing meeting.';rec.why='They asked for pricing. Move fast before energy stalls.';rec.ask='Confirm products, rough quantities, and who makes the purchase decision.';}
  if(r==='stakeholder'){rec.head='Get the right person in the room.';rec.why='Most pipeline stalls happen because the decision maker wasn\'t on the call.';rec.ask='Get a name, a role, and a meeting time with IT/security or the decision maker.';}
  if(r==='nurture'){rec.head='Turn "later" into a specific date.';rec.why='Nurture without timing is a dead pipeline.';rec.ask='What budget window governs this? Set the exact re-engage date now.';}
  if(r==='unsure'){rec.head='One more short call to get the core answers.';rec.why='If you can\'t route it, you didn\'t get a core answer.';rec.ask='Ask: who signs off, when do they need it, and what budget cycle governs it.';}
  return rec;
}

/* ─── TOAST ──────────────────────────────────────────────────────── */
var _tt=null;
function toast(msg){
  var el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.classList.remove('show');if(_tt)clearTimeout(_tt);
  setTimeout(function(){el.classList.add('show');},10);
  _tt=setTimeout(function(){el.classList.remove('show');},2600);
}

/* ─── MINI CALENDAR ──────────────────────────────────────────────── */
var CAL={year:0,month:0};
(function(){var n=new Date();CAL.year=n.getFullYear();CAL.month=n.getMonth();})();
var DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function buildCal(selectedISO,fieldKey){
  var today=new Date();today.setHours(0,0,0,0);
  var maxDate=new Date();maxDate.setMonth(maxDate.getMonth()+3);
  var y=CAL.year,m=CAL.month;
  var first=new Date(y,m,1);
  var daysInMonth=new Date(y,m+1,0).getDate();
  var startDow=first.getDay();
  var todayISO=isoDate(today);
  var maxISO=isoDate(maxDate);

  var canPrev=!(y===today.getFullYear()&&m===today.getMonth());
  var canNext=!(y===maxDate.getFullYear()&&m===maxDate.getMonth());

  var html='<div class="cal-wrap">'+
    '<div class="cal-nav">'+
      '<button'+(canPrev?'':' disabled')+' data-action="calPrev">‹</button>'+
      '<div class="cal-month">'+MONTHS[m]+' '+y+'</div>'+
      '<button'+(canNext?'':' disabled')+' data-action="calNext">›</button>'+
    '</div>'+
    '<div class="cal-grid">';
  for(var i=0;i<7;i++)html+='<div class="cal-day-hdr">'+DAYS[i]+'</div>';
  for(var e=0;e<startDow;e++)html+='<div class="cal-day cal-empty"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var dt=new Date(y,m,d);var dISO=isoDate(dt);
    var cls='cal-day';
    if(dISO<todayISO)cls+=' cal-past';
    else if(dISO>maxISO)cls+=' cal-past';
    else if(dISO===selectedISO)cls+=' cal-sel';
    else if(dISO===todayISO)cls+=' cal-today';
    var click=(dISO<todayISO||dISO>maxISO)?'':" data-action=\"calPick\" data-value=\""+dISO+"\" data-field=\""+esc(fieldKey)+"\"";
    html+='<div class="'+cls+'"'+click+'>'+d+'</div>';
  }
  return html+'</div></div>';
}

function isoDate(d){function p(n){return(n<10?'0':'')+n;}return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function prettyDate(iso){if(!iso)return'';var p=iso.split('-');if(p.length!==3)return iso;var d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}

/* ─── HTML BUILDERS ──────────────────────────────────────────────── */
function Prog(step,total,label){
  var pct=Math.round(step/total*100);
  return'<div class="prog"><div class="prog-row"><div class="prog-label">Step '+step+' of '+total+' · '+esc(label)+'</div><div class="prog-pct">'+pct+'%</div></div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';
}
function Card(lbl,body,hl){return'<div class="card'+(hl?' hl':'')+'"><div class="lbl">'+esc(lbl)+'</div>'+body+'</div>';}
function Tile(action,key,val,title,sub,sel){
  return'<div class="tile'+(sel?' sel':'')+'" data-action="'+esc(action)+'" data-key="'+esc(key)+'" data-value="'+esc(val)+'">'+
    '<div class="tile-body"><div class="tile-title">'+esc(title)+'</div>'+(sub?'<div class="tile-sub">'+esc(sub)+'</div>':'')+

/* ─── STEP 1 — Basics ─────────────────────────────────────────────── */

    '<button class="btn p" data-action="next"'+(ok?'':' disabled')+'>Continue →</button>'+
  '</div>';
}

/* ─── STEP 2 — Mission & pain ──────────────────────────────────────── */
function S2(){
  var d=S.data;
  var tiles='';for(var i=0;i<MISSIONS.length;i++){var m=MISSIONS[i];tiles+=Tile('toggleArr','missions',m.id,m.label,'',arr(d.missions).indexOf(m.id)>=0);}

  return Prog(2,6,'Mission & pain')+
  '<div style="margin-bottom:18px"><div class="h2">What is mission-critical for them?</div>'+
  '<div class="sub">Select everything that came up. This shapes which M2 story to tell and goes into the follow-up email.</div></div>'+
  '<div class="tiles two">'+tiles+'</div>'+
  (showOther?'<div style="margin-bottom:12px"><input class="in" data-f="missionOther" type="text" value="'+esc(d.missionOther)+'" placeholder="Describe the other priority" /></div>':'<div id="mOth" style="display:none;margin-bottom:12px"><input class="in" data-f="missionOther" type="text" value="'+esc(d.missionOther)+'" placeholder="Describe the other priority" /></div>')+
  Card('Biggest pain point — in their exact words',
    '<textarea class="in" data-f="pain" rows="3" placeholder="Use their phrasing, not ours. This becomes the opening line of the follow-up email.">'+esc(d.pain)+'</textarea>','hl')+
  Card('What success looks like to them',
    '<textarea class="in" data-f="success" rows="2" placeholder="What outcome are they trying to achieve?">'+esc(d.success)+'</textarea>')+
  Nav('Back','Next');
}

/* ─── STEP 3 — Starting point & signals ──────────────────────────── */
function S3(){
  var d=S.data;
  var csT='';for(var i=0;i<CURR_SWIVL.length;i++){var c=CURR_SWIVL[i];csT+=Tile('setC','currentSwivl',c.id,c.label,c.sub,d.currentSwivl===c.id);}
  var cpT='';for(var j=0;j<COACHING.length;j++){var cp=COACHING[j];cpT+=Tile('setC','coachingPractice',cp.id,cp.label,cp.sub,d.coachingPractice===cp.id);}
  var epT='';for(var k=0;k<ELL.length;k++){var ep=ELL[k];epT+=Tile('setC','ellPop',ep.id,ep.label,ep.sub,d.ellPop===ep.id);}

  var showSwivlDetail=d.currentSwivl==='active'||d.currentSwivl==='underused';
  var showTradeIn=showSwivlDetail;
  var showCoachingHint=d.coachingPractice==='no'||d.coachingPractice==='open';
  var showEllHint=d.ellPop==='significant'||d.ellPop==='some';

  var prodChips='';for(var n=0;n<PRODUCTS.length;n++){var p=PRODUCTS[n];prodChips+=Chip('toggleArr','products',p.id,p.label,arr(d.products).indexOf(p.id)>=0);}

  return Prog(3,6,'Starting point & M2 fit')+
  '<div style="margin-bottom:18px"><div class="h2">Understand their starting point</div>'+
  '<div class="sub">Three questions that shape which M2 features to lead with.</div></div>'+

  '<div class="card">'+
    '<div class="lbl">Do they currently own Swivl robots?</div>'+
    '<div class="tiles two">'+csT+'</div>'+
    '<div id="swD" style="display:'+(showSwivlDetail?'block':'none')+'">'+
      '<input class="in" data-f="swivlCount" type="text" value="'+esc(d.swivlCount)+'" placeholder="How many? (e.g. 8 units)" style="margin-bottom:8px"/>'+
      '<textarea class="in" data-f="swivlUse" rows="2" placeholder="How are they being used? (e.g. national board recording, teacher checkout, spelling bee)">'+esc(d.swivlUse)+'</textarea>'+
    '</div>'+
    '<div id="tIn" style="display:'+(showTradeIn?'block':'none')+'">'+
      '<div class="callout" style="margin-top:10px;margin-bottom:0"><h4>💱 Trade-in program</h4><p>Each returned Swivl = $250 credit toward an M2. Mention this now — it reframes the budget conversation.</p></div>'+
    '</div>'+
  '</div>'+

  '<div class="card">'+
    '<div class="lbl">Is video coaching or reflection part of their practice?</div>'+
    '<div class="tiles two">'+cpT+'</div>'+
    '<div id="coHint" style="display:'+(showCoachingHint?'block':'none')+'">'+
      '<div class="callout" style="margin-bottom:0"><h4>Reframe: teacher\'s aide, not an observation tool</h4><p>Lead with private, judgment-free feedback first. The teacher controls sharing. No camera anxiety.</p></div>'+
    '</div>'+
  '</div>'+

  '<div class="card">'+
    '<div class="lbl">Do they have ELL or multilingual learner (ML) students?</div>'+
    '<div class="tiles two">'+epT+'</div>'+
    '<div id="ellHint" style="display:'+(showEllHint?'block':'none')+'">'+
      '<div class="callout" style="margin-bottom:0"><h4>🌐 Language features are a strong differentiator here</h4><p>M2 supports in-ear translation for up to 9 students simultaneously in 140+ languages — and can translate for the whole class on demand.</p></div>'+
    '</div>'+
  '</div>'+

  Card('What are we looking at today?',
    '<div class="sub" style="margin-bottom:10px">Select what came up in the conversation.</div>'+
    '<div class="chips" style="margin-bottom:10px">'+prodChips+'</div>'+
    '<div id="pOth" style="display:'+(arr(d.products).indexOf('other')>=0?'block':'none')+'">'+
      '<input class="in" data-f="productOther" type="text" value="'+esc(d.productOther)+'" placeholder="Describe it" />'+
    '</div>'
  )+
  Tx('Additional context (optional)','contextNotes','Existing tools, constraints, org structure, objections heard so far',2)+

  Nav('Back','Next');
}

/* ─── STEP 4 — M2 signals ──────────────────────────────────────────── */
function S4(){
  var d=S.data;
  var chips='';
  for(var i=0;i<M2_FEATS.length;i++){
    var f=M2_FEATS[i];var sel=arr(d.features).indexOf(f.id)>=0;
    chips+='<div class="chip'+(sel?' sel':'')+' tile" data-action="toggleFeat" data-value="'+f.id+'" style="border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;align-items:flex-start;cursor:pointer;width:100%;margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;width:100%;align-items:center">'+
        '<div style="font-weight:700;font-size:14px;color:'+(sel?'#8E47FF':'#000')+'">'+esc(f.label)+'</div>'+
        '<div class="tile-dot">'+(sel?'<span class="ck">✓</span>':'')+
        '</div></div>'+
      '<div style="font-size:12px;color:#7A7A7A;margin-top:4px;line-height:1.4">'+esc(f.desc)+'</div>'+
    '</div>';
  }

  return Prog(4,6,'M2 signals')+
  '<div style="margin-bottom:18px"><div class="h2">What lit them up?</div>'+
  '<div class="sub">Pick up to '+FEAT_LIMIT+' features they responded to. These anchor the follow-up email and the next meeting.</div></div>'+

  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<div class="lbl" style="margin:0">Select up to '+FEAT_LIMIT+'</div>'+
    '<div style="font-size:12px;font-weight:900;color:'+(cnt>=FEAT_LIMIT?'#CC7200':'#8E47FF')+'"><span id="featCnt">'+cnt+'</span> / '+FEAT_LIMIT+'</div>'+
  '</div>'+
  chips+
  Card('Their reaction (optional)',
    '<textarea class="in" data-f="reaction" rows="3" placeholder="What excited them? Any objections? Exact quotes are gold.">'+esc(d.reaction)+'</textarea>')+

  Nav('Back','Next');

/* ─── STEP 5 — Qualification ──────────────────────────────────────── */
function S5(){
  var d=S.data;
  var tlT='';for(var i=0;i<TIMELINES.length;i++){var t=TIMELINES[i];tlT+=Tile('setC','timeline',t.id,t.label,'',d.timeline===t.id);}
  var bdT='';for(var j=0;j<BUDGET.length;j++){var b=BUDGET[j];bdT+=Tile('setC','budget',b.id,b.label,'',d.budget===b.id);}

  var dmT=
    Tile('setC','dmPresent','yes','Yes — in this meeting','',d.dmPresent==='yes')+
    Tile('setC','dmPresent','no','No — not on this call','',d.dmPresent==='no')+
    Tile('setC','dmPresent','unknown','Not sure','',d.dmPresent==='unknown');

  var stChips='';
  for(var k=0;k<STAKEHOLDER_ROLES.length;k++){
    stChips+=Chip('toggleArr','stakeholderRoles',STAKEHOLDER_ROLES[k],STAKEHOLDER_ROLES[k],arr(d.stakeholderRoles).indexOf(STAKEHOLDER_ROLES[k])>=0);
  }

  var secChips='';
  for(var n=0;n<SECURITY.length;n++){var s=SECURITY[n];secChips+=Chip('toggleArr','securityNeeds',s.id,s.label,arr(d.securityNeeds).indexOf(s.id)>=0);}

  var dmOk=!!trim(d.dmName),tlOk=!!trim(d.timeline),bdOk=!!(trim(d.budget)||trim(d.budgetNotes)),nmOk=!!trim(d.nextDate);

  return Prog(5,6,'Qualification')+
  '<div style="margin-bottom:18px"><div class="h2">Wrap-up questions</div>'+
  '<div class="sub">Ask these before you get off the call. Missing one creates a gray zone that slows the next meeting.</div></div>'+

  '<div class="callout"><h4>Fast-close script</h4><p>"Before we wrap — can I confirm your timeline, who would sign off on this, and what the right next step looks like?"</p></div>'+

  Card('Timeline — when do they want a solution?',
    '<div class="tiles two">'+tlT+'</div>'+
    Tx('Notes','timelineNotes','Implementation window, board approval timing, urgency drivers',2)
  )+

  Card('Budget — when is the funding window?',
    '<div class="tiles two">'+bdT+'</div>'+
    In('Specific date or quarter (if known)','budgetDate','e.g. Q3 FY26, July budget review')+
    Tx('Budget notes','budgetNotes','Grant, approvals, who controls it',2)
  )+

  '<div class="card"><div class="lbl">Decision maker</div>'+
    '<div class="grid2">'+
      '<div>'+In('Their name','dmName','Who signs off?')+'</div>'+
      '<div>'+In('Their title / role','dmRole','')+'</div>'+
    '</div>'+
    '<div class="lbl" style="margin-top:4px">Were they in this meeting?</div>'+
    '<div class="tiles two">'+dmT+'</div>'+
  '</div>'+

  '<div class="card">'+
    '<div class="lbl">Which roles need to be in the next meeting?</div>'+
    '<div class="chips" style="margin-bottom:12px">'+stChips+'</div>'+
    '<div class="lbl">Names (if known)</div>'+
    '<textarea class="in" data-f="stakeholderNames" rows="2" placeholder="e.g. Tim Reyes — IT Director, Maria Lopez — Curriculum Coordinator">'+esc(d.stakeholderNames)+'</textarea>'+
  '</div>'+

  '<div class="card">'+
    '<div class="lbl">Security, privacy & procurement needs</div>'+
    '<div class="chips" style="margin-bottom:12px">'+secChips+'</div>'+
    Tx('Notes','securityNotes','Vendor approval process, DPA contacts, RFP requirements',2)+
    In('Have they asked for privacy documentation? (FERPA, COPPA, DPA)','privacyDocsNeeded','Yes / No / In progress')+
  '</div>'+

  '<div class="card hl">'+
    '<div class="lbl">Clarity checklist</div>'+
    Gate('Decision maker name captured',dmOk,'gDM')+
    Gate('Timeline captured',tlOk,'gTL')+
    Gate('Budget window captured',bdOk,'gBD')+
    Gate('Next meeting date set',nmOk,'gNM')+
    '<div class="sub" style="margin-top:10px">If any are missing, ask now.</div>'+
  '</div>'+

  Nav('Back','Next');

/* ─── STEP 6 — Route + next meeting ──────────────────────────────── */
function S6(){
  var d=S.data;
  var rec=recNext();
  var routeTiles='';for(var i=0;i<ROUTES.length;i++){var r=ROUTES[i];routeTiles+=Tile('setRoute','route',r.id,r.label,r.sub,d.route===r.id);}

      '<div class="lbl">Quote details</div>'+

      '<div class="chips" style="margin-bottom:10px">'+qChips+'</div>'+
      Tx('Quote notes','quoteNotes','Quantities, trade-in units, budget constraints, procurement notes',3)+
      In('AM name','amName','Which AM takes this?')+
    '</div>'+
  '</div>'+

  '<div id="rStake" style="display:'+(d.route==='stakeholder'?'block':'none')+'">'+
    '<div class="card">'+
      '<div class="lbl">Who needs to be in the next meeting?</div>'+
      In('Role needed','nextType','e.g. IT/security director, district curriculum coordinator')+

/* ─── EMAIL BUILDER ──────────────────────────────────────────────── */
function buildEmail(){
  var d=S.data;
  var fname=trim(d.name).split(' ')[0]||'there';

  var feats=arr(d.features).map(function(id){var f=byId(M2_FEATS,id);return f?f.label:id;});
  var products=arr(d.products).map(function(id){var p=byId(PRODUCTS,id);return p?p.label:id;});
  var tradeIn=(d.currentSwivl==='active'||d.currentSwivl==='underused')&&arr(d.products).some(function(id){return id==='m2'||id==='bundle';});
  var ellBig=d.ellPop==='significant'||d.ellPop==='some';
  var privacy=trim(d.privacyDocsNeeded)&&d.privacyDocsNeeded.toLowerCase().indexOf('yes')>=0;
  var nextStr=prettyDate(d.nextDate)+(d.nextNotes?' at '+d.nextNotes:'');

  var subject='Following up — '+d.org+(d.meetingDate?' ('+d.meetingDate+')':'');

  var lines=[];
  function L(x){lines.push(x);}

  L('Hi '+fname+',');
  L('');
  if(trim(d.pain)){
    L('Really valuable time today — especially hearing about '+d.pain.charAt(0).toLowerCase()+d.pain.slice(1).replace(/\.$/,'')+'. That\'s exactly the kind of problem M2 was built to solve.');
  } else {
    L('Thanks for the time today — really enjoyed learning more about what you\'re focused on at '+esc(d.org)+'.');
  }
  L('');

  // Key points
  var points=[];
  if(feats.length)points.push('We touched on '+feats.join(', ')+(feats.length>1?' — all of which are built into M2.':'.')+'');
  if(ellBig)points.push('Given your ELL/ML student population, the in-ear translation and on-demand whole-class language support in M2 should be a strong fit.');
  if(tradeIn)points.push('A quick reminder on the trade-in program — each Swivl robot you return is worth $250 toward an M2, which can meaningfully offset the investment.');
  if(trim(d.success))points.push('You mentioned success looks like: '+d.success.replace(/\.$/,'')+'.');

  if(points.length){
    L('A few things worth highlighting from our conversation:');
    L('');
    for(var i=0;i<points.length;i++)L('  • '+points[i]);
    L('');
  }

  // Next step
  if(trim(d.nextDate)||d.route){
    L('Next step:');
    if(d.route==='pilot')L('  We\'ll get '+(trim(d.pilotType)||'devices to you')+(trim(d.pilotStart)?' starting around '+d.pilotStart:'')+'. '+(trim(d.pilotSchools)?'Plan is to try it at: '+d.pilotSchools+'. ':'')+' I\'ll follow up with a training invite and confirm shipping.');
    else if(d.route==='quote')L('  I\'m getting the pricing together and will connect you with '+(trim(d.amName)||'our account team')+' for a proper walkthrough of numbers.');
    else if(d.route==='stakeholder')L('  For the next meeting, it would be great to include '+(trim(d.nextType)||arr(d.stakeholderRoles).join(' and ')||'the right stakeholders')+' so we can answer all the right questions in one go.');
    else if(d.route==='nurture')L('  I\'ll reach back out when you\'re closer to '+(trim(d.nurtureCategory)||'your budget window')+(trim(d.nurtureDate)?' around '+d.nurtureDate:'')+'. Happy to revisit any time before then too.');
    else if(d.route==='unsure')L('  I\'d love a quick 15-minute call to get a couple of answers and make sure we\'re pointing in the right direction for you.');
    if(trim(nextStr))L('  '+(d.route==='nurture'?'We\'ll re-connect: ':'Next meeting: ')+nextStr+'.');
    L('');
  }

  if(privacy)L('I\'ll also get the data privacy documentation (FERPA / COPPA / DPA) sent over so your team can review it ahead of anything else.');
  L('');
  L('Please feel free to loop in anyone from '+d.org+' who should be part of the next conversation.');
  L('');
  L('Best,');
  L(trim(d.sdrName)||'');
  L('Swivl');

  return{subject:subject,body:lines.join('\n')};
}

  var rec={id:id,savedAt:Date.now(),data:JSON.parse(JSON.stringify(S.data))};

function clip(text,msg){
  function fb(){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast(msg);}catch(e){alert(text);}document.body.removeChild(ta);}
  try{navigator.clipboard?navigator.clipboard.writeText(text).then(function(){toast(msg);}).catch(fb):fb();}catch(e){fb();}
}

/* ─── RENDER ─────────────────────────────────────────────────────── */
function render(){
  var app=document.getElementById('app');if(!app)return;
  if(S.view==='home')app.innerHTML=HomeView();
  else if(S.view==='records')app.innerHTML=RecordsView();
  else app.innerHTML=MeetingView();
}

/* ─── EVENT DELEGATION ───────────────────────────────────────────── */
document.addEventListener('click',function(e){
  var el=e.target&&e.target.closest?e.target.closest('[data-action]'):null;
  if(!el)return;
  var a=el.getAttribute('data-action');
  if(a==='goHome')return goHome();
  if(a==='goRecords')return goRecords();
  if(a==='start')return startMeeting();
  if(a==='newMeeting')return newMeeting();
  if(a==='prev')return prevStep();
  if(a==='next')return nextStep();
  if(a==='genEmail')return genEmail();
  if(a==='regenEmail')return regenEmail();
  if(a==='toggleArr'){var k=el.getAttribute('data-key'),v=el.getAttribute('data-value');return toggleArr(k,v,el);}
  if(a==='setC'){var ck=el.getAttribute('data-key'),cv=el.getAttribute('data-value');return setC(ck,cv,el);}
  if(a==='setRoute')return setRoute(el.getAttribute('data-value'));
  if(a==='toggleFeat')return toggleFeat(el.getAttribute('data-value'),el);
  if(a==='calPrev')return calNav(-1);
  if(a==='calNext')return calNav(1);
  if(a==='calPick'){var iso=el.getAttribute('data-value'),field=el.getAttribute('data-field');return calPick(iso,field);}
  if(a==='clearDate')return clearDate();
  if(a==='saveRec')return saveRec();
  if(a==='viewRec')return viewRec(el.getAttribute('data-id'));
  if(a==='delRec')return delRec(el.getAttribute('data-id'));
  if(a==='copyEmail')return copyEmail();
  if(a==='regenEmail')return regenEmail();
  if(a==='emailSelf')return emailSelf();
  if(a==='copyNotes')return copyNotes();
  if(a==='exportPDF')return exportPDF();
});
document.addEventListener('input',function(e){var el=e.target;if(el&&el.getAttribute&&el.getAttribute('data-f'))syncField(el);});

render();
</script>
